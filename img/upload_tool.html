<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮汐视界 — 本地上传工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #1a1a2e;
    --surface2: #242442;
    --border: #2a2a4a;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #d4a843;
    --accent2: #e8c86a;
    --success: #4caf7d;
    --danger: #e05a5a;
    --warn: #d4a843;
  }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* 标题 */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text2);
    font-size: 14px;
    margin-top: 6px;
  }

  /* 分类选择 */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus {
    border-color: var(--accent);
  }

  /* 拖拽区 */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface2);
    position: relative;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(212,168,67,0.06);
  }
  .dropzone.dragover {
    transform: scale(1.01);
    box-shadow: 0 0 0 4px rgba(212,168,67,0.12);
  }
  .dropzone-icon {
    font-size: 52px;
    margin-bottom: 14px;
    opacity: 0.55;
  }
  .dropzone-text {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .dropzone-hint {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* 文件列表 */
  .file-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
  }
  .file-item .idx {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .file-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-item .size {
    color: var(--text2);
    font-size: 12px;
    flex-shrink: 0;
  }
  .file-item .status {
    flex-shrink: 0;
    font-size: 12px;
  }
  .status-pending { color: var(--text2); }
  .status-uploading { color: var(--accent); }
  .status-success { color: var(--success); }
  .status-error { color: var(--danger); }

  /* 进度条 */
  .progress-wrap {
    margin-top: 16px;
    background: var(--surface2);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--text2);
    margin-top: 8px;
    text-align: center;
    display: none;
  }
  .progress-text.show { display: block; }

  /* 上传按钮 */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(212,168,67,0.3);
  }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) {
    border-color: var(--accent);
  }

  /* 结果区 */
  .results {
    margin-top: 16px;
  }
  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 6px;
    border-left: 3px solid var(--success);
  }
  .result-item.error {
    border-left-color: var(--danger);
  }
  .result-item .icon {
    font-size: 16px;
    flex-shrink: 0;
  }
  .result-item .info {
    flex: 1;
    overflow: hidden;
  }
  .result-item .info .title {
    font-weight: 600;
    margin-bottom: 2px;
  }
  .result-item .info .meta {
    color: var(--text2);
    font-size: 12px;
  }

  /* 统计 */
  .stats {
    text-align: center;
    padding: 16px;
    color: var(--text2);
    font-size: 14px;
  }
  .stats b {
    color: var(--accent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 600;
    z-index: 10000;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.info { border-color: var(--accent); color: var(--accent); }

  /* 小提示 */
  .tip {
    font-size: 12px;
    color: var(--text2);
    margin-top: 12px;
    line-height: 1.7;
  }
  .tip code {
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>潮汐视界 — 本地上传工具</h1>
    <p>拖拽文件到下方，自动转 WebP、生成缩略图、按分类归档</p>
  </div>

  <!-- 分类选择 -->
  <div class="section">
    <div class="section-title">选择分类</div>
    <select id="categorySelect">
      <option value="">⏳ 正在加载分类...</option>
    </select>
    <div class="tip">
      文件将保存到 <code>img/分类名/</code> 文件夹，并自动追加到作品列表
    </div>
  </div>

  <!-- 拖拽上传 -->
  <div class="section">
    <div class="section-title">上传文件</div>
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📤</div>
      <div class="dropzone-text">拖拽文件到此处，或点击选择</div>
      <div class="dropzone-hint">
        支持 JPG / PNG / GIF / WebP / PSD / MP4 / MOV / AVI 等<br>
        GIF 和视频将保留完整时长转为动态 WebP
      </div>
      <input type="file" id="fileInput" multiple accept="image/*,.psd,video/*,.mp4,.mov,.avi,.mkv,.webm,.m4v,.flv" />
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnUpload" onclick="doUpload()" disabled>
        ⬆️ 开始上传
      </button>
      <button class="btn btn-ghost" onclick="clearFiles()">
        清空列表
      </button>
    </div>
  </div>

  <!-- 结果 -->
  <div class="section" id="resultSection" style="display:none;">
    <div class="section-title">上传结果</div>
    <div class="results" id="results"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── 变量 ──
  let categories = [];
  let selectedFiles = [];
  let isUploading = false;

  // ── 加载分类 ──
  async function loadCategories() {
    try {
      const res = await fetch('/categories');
      const data = await res.json();
      if (data.ok) {
        categories = data.categories;
        const sel = document.getElementById('categorySelect');
        sel.innerHTML = categories.map(c =>
          `<option value="${c.id}" data-label="${c.label}">${c.label}</option>`
        ).join('');
        if (categories.length > 0) {
          sel.value = categories[0].id;
        }
      } else {
        showToast('加载分类失败: ' + data.error, 'error');
      }
    } catch (e) {
      showToast('无法连接服务器，请确认 upload_server.py 已启动', 'error');
    }
  }

  // ── 拖拽 ──
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');

  dropzone.addEventListener('click', function(e) {
    if (e.target !== fileInput) fileInput.click();
  });

  fileInput.addEventListener('change', function() {
    addFiles(fileInput.files);
  });

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, function(e) {
      e.preventDefault();
      e.stopPropagation();
    });
  });

  dropzone.addEventListener('dragenter', () => dropzone.classList.add('dragover'));
  dropzone.addEventListener('dragover', () => dropzone.classList.add('dragover'));
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', function(e) {
    dropzone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });

  // ── 文件处理 ──
  function formatSize(bytes) {
    if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  const ALLOWED_EXTS = ['.jpg','.jpeg','.png','.gif','.webp','.bmp','.tiff','.tif','.psd','.mp4','.mov','.avi','.mkv','.webm','.m4v','.flv'];

  function addFiles(files) {
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const ext = '.' + f.name.split('.').pop().toLowerCase();
      if (ALLOWED_EXTS.indexOf(ext) === -1) continue;
      // 去重
      let exists = false;
      for (let j = 0; j < selectedFiles.length; j++) {
        if (selectedFiles[j].name === f.name && selectedFiles[j].size === f.size) {
          exists = true;
          break;
        }
      }
      if (!exists) {
        selectedFiles.push(f);
      }
    }
    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('fileList');
    if (selectedFiles.length === 0) {
      list.innerHTML = '';
      document.getElementById('btnUpload').disabled = true;
      return;
    }
    list.innerHTML = selectedFiles.map((f, i) =>
      `<div class="file-item" data-idx="${i}">
        <div class="idx">${i + 1}</div>
        <div class="name" title="${f.name}">${f.name}</div>
        <div class="size">${formatSize(f.size)}</div>
        <div class="status status-pending">等待</div>
      </div>`
    ).join('');
    document.getElementById('btnUpload').disabled = false;
  }

  function clearFiles() {
    selectedFiles = [];
    renderFileList();
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('results').innerHTML = '';
    document.getElementById('stats').innerHTML = '';
    hideProgress();
  }

  // ── 进度 ──
  function showProgress(pct, text) {
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressFill').style.width = pct + '%';
    const t = document.getElementById('progressText');
    t.classList.add('show');
    t.textContent = text;
  }

  function hideProgress() {
    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('progressText').classList.remove('show');
  }

  function updateFileStatus(idx, status, cls) {
    const items = document.querySelectorAll('.file-item');
    if (items[idx]) {
      items[idx].querySelector('.status').textContent = status;
      items[idx].querySelector('.status').className = 'status ' + cls;
    }
  }

  // ── 上传 ──
  async function doUpload() {
    if (isUploading || selectedFiles.length === 0) return;

    const sel = document.getElementById('categorySelect');
    const catId = sel.value;
    const catLabel = sel.options[sel.selectedIndex].dataset.label;

    if (!catId) {
      showToast('请先选择分类', 'error');
      return;
    }

    isUploading = true;
    document.getElementById('btnUpload').disabled = true;
    document.getElementById('btnUpload').textContent = '⏳ 处理中...';

    // 批量上传（一次传所有）
    const formData = new FormData();
    formData.append('category', catId);
    formData.append('categoryLabel', catLabel);
    for (let i = 0; i < selectedFiles.length; i++) {
      formData.append('files', selectedFiles[i]);
      updateFileStatus(i, '上传中', 'status-uploading');
    }

    showProgress(30, '正在上传...');

    try {
      const res = await fetch('/upload', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();

      if (!data.ok) {
        showProgress(0, '');
        showToast('上传失败: ' + (data.error || '未知错误'), 'error');
        for (let i = 0; i < selectedFiles.length; i++) {
          updateFileStatus(i, '失败', 'status-error');
        }
        isUploading = false;
        document.getElementById('btnUpload').disabled = false;
        document.getElementById('btnUpload').textContent = '⬆️ 开始上传';
        return;
      }

      showProgress(100, '处理完成');

      // 显示结果
      const resultsEl = document.getElementById('results');
      const resultSection = document.getElementById('resultSection');
      let html = '';
      let successCount = 0;

      for (let i = 0; i < data.results.length; i++) {
        const r = data.results[i];
        if (r.ok) {
          successCount++;
          updateFileStatus(i, '成功', 'status-success');
          html += `<div class="result-item">
            <div class="icon">✅</div>
            <div class="info">
              <div class="title">${r.caption}</div>
              <div class="meta">${r.category} · ${formatSize(r.size)} · ${r.filename}</div>
            </div>
          </div>`;
        } else {
          updateFileStatus(i, '失败', 'status-error');
          html += `<div class="result-item error">
            <div class="icon">❌</div>
            <div class="info">
              <div class="title">${selectedFiles[i].name}</div>
              <div class="meta">${r.error || '处理失败'}</div>
            </div>
          </div>`;
        }
      }

      resultsEl.innerHTML = html;
      resultSection.style.display = 'block';

      document.getElementById('stats').innerHTML =
        `成功 <b>${successCount}</b> / ${data.total} 个文件已入库`;

      showToast(`✅ 上传完成！成功 ${successCount}/${data.total} 个`, 'success');

      // 清空文件列表（保留结果显示）
      selectedFiles = [];
      renderFileList();

    } catch (e) {
      showProgress(0, '');
      showToast('上传请求失败: ' + e.message, 'error');
      for (let i = 0; i < selectedFiles.length; i++) {
        updateFileStatus(i, '失败', 'status-error');
      }
    }

    isUploading = false;
    document.getElementById('btnUpload').disabled = false;
    document.getElementById('btnUpload').textContent = '⬆️ 开始上传';
    setTimeout(hideProgress, 2000);
  }

  // ── Toast ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── 初始化 ──
  loadCategories();
</script>

</body>
</html>

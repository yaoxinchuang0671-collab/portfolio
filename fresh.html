<!DOCTYPE html><html><head><meta charset="utf-8"><title>清除缓存</title></head><body style="background:#0d0d0f;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><div style="text-align:center"><h2>正在清除缓存，请稍候...</h2><p id="status" style="color:#7c6af5"></p></div>
<script>
var s = document.getElementById('status');
var done = false;

function finish(msg) {
  if (done) return;
  done = true;
  s.textContent = msg || '完成！正在跳转首页...';
  setTimeout(function() {
    // 强制不走缓存，用时间戳参数
    location.href = '/?_=' + Date.now();
  }, 600);
}

// 超时保护：无论 Service Worker API 是否响应，5 秒后强制跳转
setTimeout(function() {
  finish('超时保护：强制跳转首页...');
}, 5000);

s.textContent = '步骤1: 注销旧版 Service Worker...';

// 如果浏览器不支持 serviceWorker，直接跳过
if (!navigator.serviceWorker) {
  finish('浏览器不支持 Service Worker，直接跳转...');
} else {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    var ps = [];
    regs.forEach(function(r) { ps.push(r.unregister()); });
    return Promise.all(ps);
  }).then(function() {
    s.textContent = '步骤2: 清除所有缓存...';
    if (typeof caches !== 'undefined') {
      return caches.keys().then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      });
    }
  }).then(function() {
    finish('完成！正在跳转首页...');
  }).catch(function(e) {
    finish('错误: ' + e + '，强制跳转...');
  });
}
</script>
</body></html>

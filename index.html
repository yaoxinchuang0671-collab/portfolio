<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="gallery.css" />
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="#home" class="logo">Portfolio<span class="dot">.</span></a>
      <nav class="nav-links"><!-- 导航链接待填充 --></nav>
    </div>
  </header>

  <!-- ===== Hero 区域（含静态兜底内容）===== -->
  <section class="hero" id="home">
    <div class="hero-bg">
      <div class="hero-blob blob-1"></div>
      <div class="hero-blob blob-2"></div>
      <div class="hero-grid"></div>
    </div>
    <div class="container hero-layout">
      <div class="hero-content">
        <p class="hero-greeting" id="heroGreeting">👋 你好，我是</p>
        <h1 class="hero-name" id="heroName">你的名字</h1>
        <p class="hero-title">
          <span class="typed-text" id="typedText">UI/UX 设计师</span><span class="cursor">|</span>
        </p>
        <p class="hero-bio" id="heroBio">这里是一段简短的自我介绍，描述你的专业方向、热情所在，以及你能带来的价值。</p>
        </div>
      </div>
  </section>

  <!-- ===== 分类筛选栏（由 render.js 动态渲染）===== -->
  <section class="filter-bar-section">
    <div class="container">
      <div class="filter-bar" id="filterBar">
        <!-- 分类按钮由 render.js 动态生成 -->
      </div>
    </div>
  </section>

  <!-- ===== 瀑布流展示区（由 render.js 动态渲染）===== -->
  <section class="gallery-section" id="gallery">
    <div class="container">
      <h2 class="section-title">作品展示</h2>
      <p class="section-subtitle">精选图片作品，点击查看大图</p>
      <div class="waterfall" id="waterfall">
        <!-- 作品卡片由 render.js 动态生成 -->
      </div>
    </div>
  </section>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <p class="lightbox-caption" id="lightboxCaption"></p>
  </div>

  <script src="main.js"></script>
  <script src="gallery.js"></script>
  <script src="render.js"></script>
</html>

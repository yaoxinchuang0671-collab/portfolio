    window.hidePreloader = function() {
      bar.style.width = '100%';
      statusEl.textContent = '\u5B8C\u6210';
      setTimeout(function() {
        preloader.classList.add('preloader-hidden');
        setTimeout(function() {
          if (preloader.parentNode) preloader.remove();
        }, 600);
      }, 300);
    };

    // 兜底：8 秒后若 render.js 仍未隐藏加载屏，强制关闭（防止 JS 异常导致永久卡住）
    setTimeout(function() {
      if (preloader && preloader.parentNode && !preloader.classList.contains('preloader-hidden')) {
        console.warn('[preloader] 超时兜底：强制关闭加载屏');
        window.hidePreloader();
      }
    }, 8000);
  })();

  (function() {
    var _contactData = null;

    // 从 portfolio_data 或 data.json 读取联系信息
    function loadContactData() {
      // 1. 尝试从独立的 contact 缓存读取（render.js 同步）
      try {
        var contactStored = localStorage.getItem('portfolio_data_contact');
        if (contactStored) {
          _contactData = JSON.parse(contactStored);
          return;
        }
      } catch (e) {}
      // 2. 尝试从完整的 portfolio_data 读取
      try {
        var stored = localStorage.getItem('portfolio_data');
        if (stored) {
          var data = JSON.parse(stored);
          if (data.contact) {
            _contactData = data.contact;
            return;
          }
        }
      } catch (e) {}
      // 3. 如果没有本地缓存，尝试从全局 DATA 读取（render.js 加载后）
      if (typeof DATA !== 'undefined' && DATA.contact) {
        _contactData = DATA.contact;
      }
    }

    window.openContactModal = function() {
      loadContactData();
      var overlay = document.getElementById('contactModal');
      if (!overlay) return;

      // 填充数据
      if (_contactData) {
        document.getElementById('contactModalTitle').textContent = _contactData.title || '联系合作';
        document.getElementById('contactModalSubtitle').textContent = _contactData.subtitle || '扫码添加微信，开启视觉合作之旅';
      }

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      // 渲染二维码：优先图片，无图片则占位提示
      var qrImage = (_contactData && _contactData.qrImage) ? _contactData.qrImage : '';
      if (qrImage) {
        showContactQRImage(qrImage);
      } else {
        drawContactQRPlaceholder();
      }
    };

    window.closeContactModal = function() {
      var overlay = document.getElementById('contactModal');
      if (!overlay) return;
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    };

    // ── 方式1：直接展示图片（线上/本地统一，预渲染透明底二维码） ──
    function showContactQRImage(dataUrl) {
      var img = document.getElementById('contactQrImg');
      var canvas = document.getElementById('contactQrCanvas');
      if (!img) return;
      img.style.display = 'none';
      if (canvas) canvas.style.display = 'none';
      img.onload = function() {
        img.style.display = 'block';
        if (canvas) canvas.style.display = 'none';
      };
      img.onerror = function() {
        drawContactQRPlaceholder();
      };
      img.src = (typeof toCdnUrl === 'function') ? toCdnUrl(dataUrl) : dataUrl;
    }

    // ── 方式2：文本生成二维码（无图片时 fallback） ──
    function drawContactQRPlaceholder() {
      var canvas = document.getElementById('contactQrCanvas');
      var img = document.getElementById('contactQrImg');
      if (!canvas) return;
      if (img) img.style.display = 'none';
      canvas.style.display = 'block';

      var ctx = canvas.getContext('2d');
      var w = 240, h = 280;
      canvas.width = w;
      canvas.height = h;
      ctx.fillStyle = '#0A0A12';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#505064';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('请在后台设置二维码', w / 2, h / 2);
    }

    // ESC 关闭弹窗
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var overlay = document.getElementById('contactModal');
        if (overlay && overlay.classList.contains('active')) {
          closeContactModal();
        }
      }
    });
  })();
  </script> <script>

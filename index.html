<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="stylesheet" href="gallery.css?v=3" />
  <style>
    /* 禁止图片右键保存/拖拽保存 */
    img {
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      user-drag: none;
      -webkit-touch-callout: none;
      pointer-events: auto;
    }
    /* 禁用整个页面的右键菜单（保留输入框等） */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    /* 允许输入框/文本框选中文字 */
    input, textarea {
      -webkit-user-select: auto;
      -moz-user-select: auto;
      -ms-user-select: auto;
      user-select: auto;
    }
    /* ===== 导航图片弹窗 ===== */
    #navImgOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #navImgOverlay.active { display: flex; }
    #navImgOverlay .nav-modal-inner {
      position: relative;
      max-width: min(90vw, 600px);
      width: 100%;
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    #navImgOverlay .nav-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #navImgTitle {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }
    #navImgOverlay .nav-modal-close {
      background: none;
      border: none;
      color: #888;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.2s;
    }
    #navImgOverlay .nav-modal-close:hover { color: #fff; }
    #navImgModal {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════
       预加载屏
       ═══════════════════════════════════ -->
  <div class="preloader" id="preloader">
    <div class="preloader-logo">潮汐视界<span class="dot">.</span></div>
    <div class="preloader-spin" id="preloaderSpin"></div>
    <div class="preloader-bar-wrap"><div class="preloader-bar" id="preloaderBar"></div></div>
    <p class="preloader-status" id="preloaderStatus">正在准备作品…</p>
  </div>

  <!-- 禁用右键菜单（图片/页面） -->
  <script>
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
        e.preventDefault();
        return false;
      }
    });
    // 禁用开发者工具常用快捷键
    document.addEventListener('keydown', function(e) {
      // Ctrl+Shift+I / F12 / Ctrl+Shift+J / Ctrl+U / Ctrl+S
      if (
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
        e.key === 'F12' ||
        (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S'))
      ) {
        e.preventDefault();
        return false;
      }
    });
  </script>

  <!-- ===== 导航栏 ===== -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="#home" class="logo">潮汐视界<span class="dot">.</span></a>
      <nav class="nav-links"><!-- 导航链接待填充 --></nav>
    </div>
  </header>

  <!-- ===== Hero 区域 ===== -->
  <section class="hero" id="home">
    <div class="container hero-layout">
      <div class="hero-card" id="heroCard">
        <div class="hero-card-bg" id="heroCardBg"></div>
        <div class="hero-content">
          <p class="hero-greeting" id="heroGreeting"></p>
          <h1 class="hero-name" id="heroName"></h1>
          <p class="hero-title" id="heroTitle">
            <span id="typedWrap"></span><span class="cursor">|</span>
          </p>
          <p class="hero-bio" id="heroBio"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 分类筛选栏 ===== -->
  <section class="filter-bar-section">
    <div class="container">
      <div class="filter-panel">
        <div class="filter-bar" id="filterBar">
          <!-- 分类按钮由 render.js 动态生成 -->
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 瀑布流展示区（由 render.js 动态渲染）===== -->
  <section class="gallery-section" id="gallery">
    <div class="container">
      <div class="waterfall" id="waterfall">
        <!-- 作品卡片由 render.js 动态生成 -->
      </div>
    </div>
  </section>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <p class="lightbox-caption" id="lightboxCaption"></p>
  </div>

  <!-- ===== 导航图片弹窗 ===== -->
  <div id="navImgOverlay" onclick="if(event.target===this)closeNavImgModal()">
    <div class="nav-modal-inner">
      <div class="nav-modal-header">
        <span id="navImgTitle"></span>
        <button class="nav-modal-close" onclick="closeNavImgModal()">&#x2715;</button>
      </div>
      <img id="navImgModal" src="" alt="" draggable="false"
           oncontextmenu="return false;" />
    </div>
  </div>

  <script src="main.js?v=3"></script>
  <script src="gallery.js?v=3"></script>
  <script src="render.js?v=6"></script>
  <!-- ===== 预加载屏 UI 控制（逻辑在 render.js）===== -->
  <script>
  (function() {
    var preloader = document.getElementById('preloader');
    var bar       = document.getElementById('preloaderBar');
    var statusEl  = document.getElementById('preloaderStatus');

    window.updatePreloader = function(pct, text) {
      bar.style.width = pct + '%';
      if (text) statusEl.textContent = text;
    };

    window.hidePreloader = function() {
      bar.style.width = '100%';
      statusEl.textContent = '\u5B8C\u6210';
      setTimeout(function() {
        preloader.classList.add('preloader-hidden');
        setTimeout(function() {
          if (preloader.parentNode) preloader.remove();
        }, 600);
      }, 300);
    };
  })();
  </script>
</html>

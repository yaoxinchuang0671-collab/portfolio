name: Sync ledger_data.json to COS

on:
  push:
    paths:
      - 'ledger_data.json'
  workflow_dispatch:

jobs:
  sync-to-cos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5 -q

      - name: Upload ledger_data.json to COS
        env:
          COS_SECRET_ID:  ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          python -c "
          import os
          from qcloud_cos import CosConfig, CosS3Client

          secret_id  = os.environ['COS_SECRET_ID']
          secret_key = os.environ['COS_SECRET_KEY']
          region     = 'ap-guangzhou'
          bucket     = 'portfolio-images-1438664071'

          config = CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key)
          client = CosS3Client(config)

          with open('ledger_data.json', 'rb') as f:
              body = f.read()

          client.put_object(
              Bucket=bucket,
              Key='ledger_data.json',
              Body=body,
              CacheControl='no-cache'
          )
          print('✅ 已同步到 COS')
          "

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>清除缓存</title>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; background:#0a0a0f; color:#e0e0e0; flex-direction:column; gap:20px; }
    button { padding:12px 32px; font-size:16px; border:none; border-radius:8px; cursor:pointer; }
    .clear { background:#6c5ce7; color:#fff; }
    .done { background:#00b894; color:#fff; display:none; }
    #msg { color:#ff7675; }
  </style>
</head>
<body>
  <h2>清除 localStorage 缓存</h2>
  <p>点击按钮清除 <code>portfolio_data</code>，让 data.json 生效</p>
  <button class="clear" onclick="doClear()">清除缓存并跳转首页</button>
  <div id="msg"></div>
  <button class="done" id="btnDone" onclick="location.href='index.html'">去首页 →</button>

  <script>
    function doClear() {
      var key = 'portfolio_data';
      var val = localStorage.getItem(key);
      if (val) {
        localStorage.removeItem(key);
        document.getElementById('msg').style.color = '#00b894';
        document.getElementById('msg').textContent = '✅ 已清除 ' + key + '（' + val.length + ' 字符）';
      } else {
        document.getElementById('msg').style.color = '#fdcb6e';
        document.getElementById('msg').textContent = '⚠️ ' + key + ' 已是空的，无需清除';
      }
      document.querySelector('.clear').style.display = 'none';
      document.getElementById('btnDone').style.display = 'inline-block';
    }
  </script>
</body>
</html>
